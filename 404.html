<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Aura Inventory</title>
    <script>
      // SPA en GitHub Pages: convierte la ruta en query y redirige al index.
      // https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 1 // /AuraInventory/
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .split('/')
            .slice(1 + pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      )
    </script>
  </head>
  <body></body>
</html>
